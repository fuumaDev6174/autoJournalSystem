services:
  - type: web
    name: tax-copilot
    env: node
    region: singapore
    plan: free
    buildCommand: npm ci --include=dev && npm run build:all
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_MODEL_OCR
        value: gemini-3-flash-preview
      - key: GEMINI_MODEL_JOURNAL
        value: gemini-3.1-pro-preview
      - key: ALLOWED_ORIGINS
        value: https://besoautojournalsystem.onrender.com
    autoDeploy: true